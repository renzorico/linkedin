name: Daily Agent Search

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  daily-search:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve Python version from requirements.txt
        id: pyver
        shell: bash
        run: |
          PYTHON_VERSION=$(grep -E "^#\s*python-version:" streamlit_job_app/requirements.txt | tail -n1 | sed -E 's/^#\s*python-version:\s*//')
          if [ -z "$PYTHON_VERSION" ]; then
            PYTHON_VERSION="3.12"
          fi
          echo "version=$PYTHON_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.pyver.outputs.version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r streamlit_job_app/requirements.txt

      - name: Run daily agent search
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
        run: python -m agent.runner

      - name: Ensure artifact file exists
        run: |
          mkdir -p data
          if [ ! -f data/agent_ranked_results.csv ]; then
            touch data/agent_ranked_results.csv
          fi

      - name: Upload ranked jobs artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-jobs
          path: data/agent_ranked_results.csv
